<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinApp - Cadastro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <header class="auth-header">
            <div class="brand-icon"><i class="fas fa-user-plus"></i></div>
            <h1>Fin<span>App</span></h1>
        </header>

        <main class="card">
            <h2>Cadastrar Usuário</h2>
            <form id="cadastroForm">
                <div class="form-group">
                    <label for="cad-nome">Nome Completo</label>
                    <div class="input-control" id="wrap-c-nome">
                        <i class="fas fa-user"></i>
                        <input type="text" id="cad-nome" placeholder="Seu nome">
                    </div>
                </div>
                <div class="form-group">
                    <label for="cad-email">E-mail</label>
                    <div class="input-control" id="wrap-c-email">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="cad-email" placeholder="seu@email.com">
                    </div>
                </div>
                <div class="form-group">
                    <label for="cad-senha">Senha</label>
                    <div class="input-control" id="wrap-c-senha">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="cad-senha" placeholder="Sua senha">
                    </div>
                </div>
                <button class="btn-submit" type="submit">Finalizar Conta <i class="fas fa-check"></i></button>
            </form>
            <div class="ui-divider"></div>
            <footer class="auth-footer">
                <p>Já tem conta? <a href="index.html">Fazer Login</a></p>
            </footer>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
