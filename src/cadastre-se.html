<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FinApp - Cadastro</title>
</head>

<body>

    <div class="wrap">

        <div class="info">

            <div class="wallet">
                FinApp
            </div>

            <h1>Fin<span>App</span></h1>

            <p>Crie sua conta.</p>

        </div>

        <div class="card">

            <h2>Cadastro</h2>

            <form>

                <div class="area">

                    <label for="nome">
                        Nome Completo:
                    </label>

                    <div class="user">

                        <input
                            type="text"
                            id="nome"
                            name="nome"
                            placeholder="Seu nome completo"
                        >

                    </div>

                </div>

                <div class="area">

                    <label for="email">
                        E-mail:
                    </label>

                    <div class="email">

                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="exemplo@email.com"
                        >

                    </div>

                </div>

                <div class="area">

                    <label for="senha">
                        Senha:
                    </label>

                    <div class="lock">

                        <input
                            type="password"
                            id="senha"
                            name="senha"
                            placeholder="********"
                        >

                    </div>

                </div>

                <div class="area">

                    <label for="confirmarSenha">
                        Confirmar Senha:
                    </label>

                    <div class="lock">

                        <input
                            type="password"
                            id="confirmarSenha"
                            name="confirmarSenha"
                            placeholder="********"
                        >

                    </div>

                </div>

                <button class="btn" type="submit">
                    Finalizar Cadastro
                </button>

            </form>

            <div class="divider"></div>

            <div class="register">

                <p>
                    Já possui conta?
                    <a href="#">
                        Fazer login
                    </a>
                </p>

            </div>

        </div>

    </div>

</body>

</html>
