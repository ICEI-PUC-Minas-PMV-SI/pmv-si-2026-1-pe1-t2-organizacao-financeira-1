<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastra-se.css">

    <title>FinApp - Cadastro</title>
</head>

<body>

    <div class="wrap">

        <div class="info">

            <div class="wallet">
                FinApp
            </div>

            <h1>Fin<span>App</span></h1>

            <p onclick="mostrarCadastro()" style="cursor: pointer; color: #2CACE6;">Crie sua conta.</p>

        </div>

        <div class="card" id="cadastroCard" style="display: none;">

            <h2>Cadastro</h2>

            <form>

                <div class="area">

                    <label for="nome">
                        Nome Completo:
                    </label>

                    <div class="user">

                        <input
                            type="text"
                            id="nome"
                            name="nome"
                            placeholder="Seu nome completo"
                        >

                    </div>

                </div>

                <div class="area">

                    <label for="email">
                        E-mail:
                    </label>

                    <div class="email">

                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="exemplo@email.com"
                        >

                    </div>

                </div>

                <div class="area">

                    <label for="senha">
                        Senha:
                    </label>

                    <div class="lock">

                        <input
                            type="password"
                            id="senha"
                            name="senha"
                            placeholder="********"
                        >

                    </div>

                </div>

                <div class="area">

                    <label for="confirmarSenha">
                        Confirmar Senha:
                    </label>

                    <div class="lock">

                        <input
                            type="password"
                            id="confirmarSenha"
                            name="confirmarSenha"
                            placeholder="********"
                        >

                    </div>

                    <p id="mensagemErroSenha" style="color: red; display: none;">As senhas são diferentes.</p>

                </div>

                <p id="mensagemErro" style="color: red; display: none;">Por favor, preencha todos os campos obrigatórios.</p>

                <button class="btn" type="button" onclick="salvarCadastro()">
                    Finalizar Cadastro
                </button>

            </form>

            <div class="divider"></div>

            <div class="register">

                <p>
                    Já possui conta?
                    <a href="index.html">
                        Fazer login
                    </a>
                </p>

            </div>

        </div>

    </div>
    <script>
        function mostrarCadastro() {
            document.getElementById("cadastroCard").style.display = "block";
        }

        function salvarCadastro() {
            const nomeInput = document.getElementById('nome');
            const emailInput = document.getElementById('email');
            const senhaInput = document.getElementById('senha');
            const confirmarSenhaInput = document.getElementById('confirmarSenha');

            const erroCampos = document.getElementById('mensagemErro');
            const erroSenha = document.getElementById('mensagemErroSenha');

            erroCampos.style.display = "none";
            erroSenha.style.display = "none";

            const nome = nomeInput.value;
            const email = emailInput.value;
            const senha = senhaInput.value;
            const confirmarSenha = confirmarSenhaInput.value;

            if (nome === "" || email === "" || senha === "") {
                erroCampos.style.display = "block";
                return;
            }

            if (senha !== confirmarSenha) {
                erroSenha.style.display = "block";
                return;
            }

            const usuario = {
                nome: nome,
                email: email,
                senha: senha
            };

            localStorage.setItem('dbuser', JSON.stringify(usuario));

            alert("Cadastro realizado com sucesso!");

            nomeInput.value = "";
            emailInput.value = "";
            senhaInput.value = "";
            confirmarSenhaInput.value = "";
        }
    </script>
</body>

</html>
