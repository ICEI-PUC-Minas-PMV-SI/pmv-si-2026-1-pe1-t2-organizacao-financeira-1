<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinApp - Login</title>
</head>
<body>

    <div>
        <h1>FinApp</h1>
        <p>Gerencie suas finanças hoje.</p>
    </div>

    <div>
        <h2>Login</h2>

        <form>
            <div>
                <label for="email">Email</label><br>
                <input type="email" id="email" name="email" placeholder="exemplo@email.com">
            </div>

            <br>

            <div>
                <label for="senha">Senha</label><br>
                <input type="password" id="senha" name="senha" placeholder="****">
            </div>

            <br>

            <div>
                <a href="#">Esqueceu a senha?</a>
            </div>

            <br>

            <button type="submit">Entrar no App</button>
        </form>

        <br>

        <div>
            <p>Ainda não tem conta? <a href="#">Cadastre-se</a></p>
        </div>
    </div>

</body>
</html>
