<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinApp - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <header class="auth-header">
            <div class="brand-icon"><i class="fas fa-wallet"></i></div>
            <h1>Fin<span>App</span></h1>
        </header>

        <main class="card">
            <h2>Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="login-email">E-mail</label>
                    <div class="input-control" id="wrap-l-email">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="login-email" placeholder="exemplo@email.com">
                    </div>
                </div>

                <div class="form-group">
                    <label for="login-senha">Senha</label>
                    <div class="input-control" id="wrap-l-senha">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="login-senha" placeholder="**********">
                    </div>
                </div>

                <button class="btn-submit" type="submit">Entrar no App <i class="fas fa-sign-in-alt"></i></button>
            </form>
            <div class="ui-divider"></div>
            <footer class="auth-footer">
                <p>Ainda não tem conta? <a href="cadastre-se.html">Cadastre-se</a></p>
            </footer>
        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
